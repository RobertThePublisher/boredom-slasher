<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boredom Eraser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/effects.css">

    <link rel="icon" type="image/png" href="button.png">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #00FF00;
            font-family: 'Courier Prime', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        #terminal-container {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            text-align: left;
            line-height: 1.6;
            min-height: 150px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00FF00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { background-color: #00FF00; }
            50%, 100% { background-color: transparent; }
        }

        #button-container {
            margin: 40px 0;
            display: none; 
            justify-content: center;
            width: 100%;
        }

        /* The Big Red Button */
        .red-button {
            background-color: #ff0000;
            color: white;
            border: 5px solid #8b0000;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            font-family: 'Courier Prime', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #8b0000, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            outline: none;
        }

        .red-button:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #8b0000, 0 5px 10px rgba(0,0,0,0.5);
        }

        #content-display {
            width: 100%;
            max-width: 1781px;
            height: 892px;
            margin-top: 20px;
            border: 3px solid #00FF00;
            display: none;
            background: #111;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

        <span id="typewriter"></span><span class="cursor">&nbsp;</span>
    </div>

        let lastIndex = -1;

        function triggerAdventure() {
            const displayContainer = document.getElementById("content-display");
            displayContainer.style.display = "block";
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * adventures.length);
            } while (randomIndex === lastIndex && adventures.length > 1);

            const chosen = adventures[randomIndex];

            if (chosen.type === 'youtube') {
